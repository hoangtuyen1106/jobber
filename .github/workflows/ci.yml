name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'npm'

      - run: npm ci --legacy-peer-deps
      - uses: nrwl/nx-set-shas@v5

      # Truyền trực tiếp env và ép chế độ CI để tránh các interactive prompt bị treo
      - name: Run Nx Affected Tasks
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CI: true
        run: npx nx affected --targets=lint,test,build --parallel=false
